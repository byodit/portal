<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal BYOD Studios</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Roboto Mono', monospace;
    background-color: #0d0d0d;
    color: #e0e0e0;
}

/* HEADER */
header {
    display: flex;
    flex-direction: column;
    padding: 15px 30px;
    background: linear-gradient(90deg, #0f0f0f, #1a1a1a);
    border-bottom: 1px solid #222;
    box-shadow: 0 2px 10px rgba(0,255,255,0.1);
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.user-info {
    font-size: 14px;
    color: #00ffff;
}

/* MITARBEITERVERZEICHNIS */
.directory {
    margin-top: 15px;
    background-color: #121212;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,255,255,0.15);
}

.directory h2 {
    color: #00ffff;
    margin-bottom: 10px;
}

.directory input {
    width: 70%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #00ffff;
    background-color: #1a1a1a;
    color: #e0e0e0;
}

.directory button {
    width: 25%;
    padding: 10px;
    margin-left: 5%;
    background-color: #00ffff;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

.employee-list {
    margin-top: 15px;
    max-height: 180px;
    overflow-y: auto;
}

.employee {
    padding: 10px;
    border-bottom: 1px solid #222;
    transition: 0.2s;
}

.employee:hover {
    background-color: rgba(0,255,255,0.1);
}

/* MAIN */
main {
    display: flex;
    justify-content: center;
    align-items: center;
    height: calc(100vh - 160px);
    flex-direction: column;
}

.login-container, .apps-container, .loading-container {
    background-color: #121212;
    padding: 40px 30px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,255,255,0.2);
    width: 350px;
    text-align: center;
    margin-bottom: 20px;
}

h1 {
    color: #00ffff;
}

/* INPUTS */
input {
    width: 100%;
    padding: 10px;
    margin-bottom: 20px;
    border-radius: 8px;
    border: 1px solid #00ffff;
    background-color: #1a1a1a;
    color: #e0e0e0;
}

/* BUTTONS */
button {
    width: 100%;
    padding: 12px;
    font-weight: bold;
    font-size: 14px;
    color: #0d0d0d;
    background-color: #00ffff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #00cccc;
    box-shadow: 0 0 10px #00ffff;
}

.apps-list button {
    background-color: #1a1a1a;
    color: #0ff;
    border: 2px solid #00ffff;
    margin-bottom: 10px;
}

.apps-list button:hover {
    background-color: #00ffff;
    color: #0d0d0d;
}

/* LOADER */
.loader {
    border: 5px solid #121212;
    border-top: 5px solid #00ffff;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
    margin: 20px auto;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

.hidden { display: none; }
</style>
</head>

<body>

<header>
    <div class="top-bar">
        <div>Portal BYOD Studios</div>
        <div class="user-info">Angemeldet: —</div>
    </div>

    <!-- VERZEICHNIS -->
    <div class="directory hidden" id="directory">
        <h2>Mitarbeiterverzeichnis</h2>
        <div style="display:flex;">
            <input type="text" id="searchEmployee" placeholder="Suchen nach Name, Personalnummer, Telefon...">
            <button onclick="searchEmployees()">Suchen</button>
        </div>
        <div class="employee-list" id="employeeList"></div>
    </div>
</header>

<main>

<div class="login-container" id="loginContainer">
    <h1>Login</h1>
    <input id="username" placeholder="Benutzername">
    <input id="password" type="password" placeholder="Passwort">
    <button onclick="login()">Anmelden</button>
</div>

<div class="loading-container hidden" id="loadingContainer">
    <h1>Laden der Apps...</h1>
    <div class="loader"></div>
</div>

<div class="apps-container hidden" id="appsContainer">
    <h1>Ihre Apps</h1>
    <div class="apps-list" id="appsList"></div>
</div>

</main>

<script>

/* USERS */
const users = [
{ username: "61128323", password: "Indoorcycling2026!", vorname: "Louis", nachname: "Schwickert", apps: [
    {name: "UserHelpDesk", url: "https://byodstudios.onepage.me/userhelpdesk"},
    {name: "Intranet", url: "https://byodit1.bitrix24.de"},
    {name: "Prüfungsportal - Kandidatenzugang", url: "https://candidate.speedexam.net"},
    {name: "Homepage", url: "https://byodstudios.onepage.me"}
]},
{ username: "07040934", password: "start123!", vorname: "Tiemo", nachname: "Kroth", apps: [] }
];

/* MITARBEITER */
const employees = [
{ personalnr: "61128323", vorname: "Louis", nachname: "Schwickert", tel: "+49 15901993688", email: "LSchwickert.BYOD@outlook.de" },
{ personalnr: "07040934", vorname: "Tiemo", nachname: "Kroth", tel: "-", email: "TKroth.BYOD@outlook.de" }
];

/* LOGIN */
function login() {
    const user = users.find(u =>
        u.username === username.value &&
        u.password === password.value
    );

    if(user) {
        document.querySelector(".user-info").textContent =
            "Angemeldet: " + user.vorname + " " + user.nachname;

        loginContainer.classList.add("hidden");
        loadingContainer.classList.remove("hidden");

        setTimeout(() => {
            loadingContainer.classList.add("hidden");
            appsContainer.classList.remove("hidden");
            directory.classList.remove("hidden");
            loadApps(user.apps);
        }, 2000);
    } else {
        alert("Benutzername oder Passwort ist falsch.");
    }
}

/* APPS */
function loadApps(apps) {
    const list = document.getElementById("appsList");
    list.innerHTML = "";

    apps.forEach(app => {
        const btn = document.createElement("button");
        btn.textContent = app.name;
        btn.onclick = () => window.open(app.url, "_blank");
        list.appendChild(btn);
    });
}

/* MITARBEITER */
function renderEmployees(list) {
    const container = document.getElementById("employeeList");
    container.innerHTML = "";

    list.forEach(emp => {
        container.innerHTML += `
        <div class="employee">
            <b>${emp.vorname} ${emp.nachname}</b> (${emp.personalnr})<br>
            Tel: ${emp.tel}<br>
            Mail: ${emp.email}
        </div>`;
    });
}

/* SUCHE */
function searchEmployees() {
    const value = document.getElementById("searchEmployee").value.toLowerCase();

    const result = employees.filter(e =>
        e.vorname.toLowerCase().includes(value) ||
        e.nachname.toLowerCase().includes(value) ||
        e.personalnr.includes(value) ||
        e.tel.includes(value)
    );

    renderEmployees(result);
}

</script>

</body>
</html>
