<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal BYOD Studios</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Roboto Mono', monospace;
    background-color: #0d0d0d;
    color: #e0e0e0;
}

header {
    display: flex;
    flex-direction: column;
    padding: 15px 30px;
    background: linear-gradient(90deg, #0f0f0f, #1a1a1a);
    border-bottom: 1px solid #222;
}

.top-bar {
    display: flex;
    justify-content: space-between;
}

.user-info {
    color: #00ffff;
}

/* Mitarbeiterverzeichnis */
.directory {
    margin-top: 15px;
    background: #121212;
    padding: 15px;
    border-radius: 12px;
}

.directory input {
    width: 70%;
    padding: 8px;
    margin-right: 5px;
}

.directory button {
    padding: 8px 10px;
    cursor: pointer;
}

.employee {
    border-bottom: 1px solid #222;
    padding: 5px;
    font-size: 13px;
}

.hidden { display: none; }

main {
    display: flex;
    justify-content: center;
    align-items: center;
    height: calc(100vh - 140px);
    flex-direction: column;
}

.container {
    background: #121212;
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
}

button {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    background: #00ffff;
    border: none;
    cursor: pointer;
}

.loader {
    border: 5px solid #121212;
    border-top: 5px solid #00ffff;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
    margin: 20px auto;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<header>
    <div class="top-bar">
        <div>Portal BYOD Studios</div>
        <div class="user-info">Angemeldet: —</div>
    </div>

    <!-- VERZEICHNIS (nur nach Login sichtbar) -->
    <div class="directory hidden" id="directory">
        <h3>Mitarbeiterverzeichnis</h3>
        <input type="text" id="searchEmployee" placeholder="Suchen...">
        <button onclick="searchEmployees()">Suchen</button>
        <div id="employeeList"></div>
    </div>
</header>

<main>

<div class="container" id="loginContainer">
    <h2>Login</h2>
    <input id="username" placeholder="Benutzername">
    <input id="password" type="password" placeholder="Passwort">
    <button onclick="login()">Anmelden</button>
</div>

<div class="container hidden" id="loadingContainer">
    <h2>Laden...</h2>
    <div class="loader"></div>
</div>

<div class="container hidden" id="appsContainer">
    <h2>Ihre Apps</h2>
    <div id="appsList"></div>
</div>

</main>

<script>

/* USERS */
const users = [
{ username: "61128323", password: "Indoorcycling2026!", vorname: "Louis", nachname: "Schwickert", apps: [
    {name: "userhelpdesk", url: "https://byodstudios.onepage.me/userhelpdesk"},
    {name: "Intranet", url: "https://byodit1.bitrix24.de"},
    {name: "Prüfungsportal", url: "https://candidate.speedexam.net"}
]},
{ username: "07040934", password: "start123!", vorname: "Tiemo", nachname: "Kroth", apps: [] }
];

/* MITARBEITER */
const employees = [
{ personalnr: "61128323", vorname: "Louis", nachname: "Schwickert", tel: "015901993688", email: "LSchwickert.BYOD@outlook.de" },
{ personalnr: "07040934", vorname: "Tiemo", nachname: "Kroth", tel: "-", email: "TKroth.BYOD@outlook.de" }
];

/* LOGIN */
function login() {
    const user = users.find(u =>
        u.username === username.value &&
        u.password === password.value
    );

    if(user) {
        document.querySelector(".user-info").textContent =
            "Angemeldet: " + user.vorname + " " + user.nachname;

        loginContainer.classList.add("hidden");
        loadingContainer.classList.remove("hidden");

        setTimeout(() => {
            loadingContainer.classList.add("hidden");
            appsContainer.classList.remove("hidden");
            directory.classList.remove("hidden");
            loadApps(user.apps);
        }, 2000);
    } else {
        alert("Login falsch");
    }
}

/* APPS */
function loadApps(apps) {
    const list = document.getElementById("appsList");
    list.innerHTML = "";

    apps.forEach(app => {
        const btn = document.createElement("button");
        btn.textContent = app.name;
        btn.onclick = () => window.open(app.url);
        list.appendChild(btn);
    });
}

/* MITARBEITER ANZEIGEN */
function renderEmployees(list) {
    const container = document.getElementById("employeeList");
    container.innerHTML = "";

    list.forEach(emp => {
        container.innerHTML += `
        <div class="employee">
            <b>${emp.vorname} ${emp.nachname}</b> (${emp.personalnr})<br>
            Tel: ${emp.tel}<br>
            Mail: ${emp.email}
        </div>`;
    });
}

/* SUCHE */
function searchEmployees() {
    const value = document.getElementById("searchEmployee").value.toLowerCase();

    const result = employees.filter(e =>
        e.vorname.toLowerCase().includes(value) ||
        e.nachname.toLowerCase().includes(value) ||
        e.personalnr.includes(value)
    );

    renderEmployees(result);
}

</script>

</body>
</html>
