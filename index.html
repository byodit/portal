<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal BYOD Studios</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0b0f14;
    --card: rgba(20, 25, 32, 0.85);
    --accent: #00e5ff;
    --accent-soft: rgba(0,229,255,0.15);
    --text: #e6edf3;
    --border: rgba(255,255,255,0.08);
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #0f1720, #05080c);
    color: var(--text);
}

header {
    backdrop-filter: blur(12px);
    background: rgba(10,15,20,0.7);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 600;
}

.user-info {
    color: var(--accent);
}

.directory {
    margin-top: 20px;
    padding: 20px;
    border-radius: 16px;
    background: var(--card);
    border: 1px solid var(--border);
}

.directory h2 {
    margin-bottom: 10px;
    color: var(--accent);
}

.directory input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: #0f141a;
    color: var(--text);
}

.directory button {
    margin-left: 10px;
    padding: 10px 15px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    cursor: pointer;
    font-weight: 600;
}

.employee-list {
    margin-top: 15px;
    max-height: 200px;
    overflow-y: auto;
}

.employee {
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    transition: 0.2s;
}

.employee:hover {
    background: var(--accent-soft);
    transform: translateY(-2px);
}

main {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 160px);
    flex-direction: column;
}

.login-container, .apps-container, .loading-container {
    width: 360px;
    padding: 35px;
    border-radius: 18px;
    background: var(--card);
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    text-align: center;
}

h1 {
    margin-bottom: 20px;
    color: var(--accent);
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: #0f141a;
    color: var(--text);
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: 600;
    background: linear-gradient(135deg, #00e5ff, #00bcd4);
    color: #001014;
    cursor: pointer;
    transition: 0.25s;
}

button:hover {
    transform: translateY(-1px);
    box-shadow: 0 0 15px rgba(0,229,255,0.5);
}

.apps-list button {
    margin-bottom: 10px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
}

.apps-list button:hover {
    background: var(--accent);
    color: #001014;
}

.loader {
    border: 4px solid transparent;
    border-top: 4px solid var(--accent);
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
    margin: 20px auto;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

.hidden { display: none; }

</style>
</head>

<body>

<header>
    <div class="top-bar">
        <div>BYOD Studios Intranet</div>
        <div class="user-info">Angemeldet: —</div>
    </div>

    <div class="directory hidden" id="directory">
        <h2>Mitarbeiterverzeichnis</h2>
        <div style="display:flex;">
            <input type="text" id="searchEmployee" placeholder="Suchen nach Name, Personalnummer, Telefon...">
            <button onclick="searchEmployees()">Suchen</button>
        </div>
        <div class="employee-list" id="employeeList"></div>
    </div>
</header>

<main>

<div class="login-container" id="loginContainer">
    <h1>Login</h1>
    <input id="username" placeholder="Benutzername">
    <input id="password" type="password" placeholder="Passwort">
    <button onclick="login()">Anmelden</button>
</div>

<div class="loading-container hidden" id="loadingContainer">
    <h1>Laden der Apps...</h1>
    <div class="loader"></div>
</div>

<div class="apps-container hidden" id="appsContainer">
    <h1>Ihre Apps</h1>
    <div class="apps-list" id="appsList"></div>
</div>

</main>

<script>

const users = [
{ username: "61128323", password: "Indoorcycling2026!", vorname: "Louis", nachname: "Schwickert", apps: [
    {name: "UserHelpDesk", url: "https://byodstudios.onepage.me/userhelpdesk"},
    {name: "Intranet", url: "https://byodit1.bitrix24.de"},
    {name: "Prüfungsportal - Kandidatenzugang", url: "https://candidate.speedexam.net"},
    {name: "Homepage", url: "https://byodstudios.onepage.me"}
]},
{ username: "07040934", password: "start123!", vorname: "Tiemo", nachname: "Kroth", apps: [] }
];

const employees = [
{ personalnr: "61128323", vorname: "Louis", nachname: "Schwickert", tel: "+49 15901993688", email: "LSchwickert.BYOD@outlook.de" },
{ personalnr: "07040934", vorname: "Tiemo", nachname: "Kroth", tel: "-", email: "TKroth.BYOD@outlook.de" }
];

function login() {
    const user = users.find(u =>
        u.username === username.value &&
        u.password === password.value
    );

    if(user) {
        document.querySelector(".user-info").textContent =
            "Angemeldet: " + user.vorname + " " + user.nachname;

        loginContainer.classList.add("hidden");
        loadingContainer.classList.remove("hidden");

        setTimeout(() => {
            loadingContainer.classList.add("hidden");
            appsContainer.classList.remove("hidden");
            directory.classList.remove("hidden");
            loadApps(user.apps);
        }, 2000);
    } else {
        alert("Benutzername oder Passwort ist falsch.");
    }
}

function loadApps(apps) {
    const list = document.getElementById("appsList");
    list.innerHTML = "";

    apps.forEach(app => {
        const btn = document.createElement("button");
        btn.textContent = app.name;
        btn.onclick = () => window.open(app.url, "_blank");
        list.appendChild(btn);
    });
}

function renderEmployees(list) {
    const container = document.getElementById("employeeList");
    container.innerHTML = "";

    list.forEach(emp => {
        container.innerHTML += `
        <div class="employee">
            <b>${emp.vorname} ${emp.nachname}</b> (${emp.personalnr})<br>
            Tel: ${emp.tel}<br>
            Mail: ${emp.email}
        </div>`;
    });
}

function searchEmployees() {
    const value = document.getElementById("searchEmployee").value.toLowerCase();

    const result = employees.filter(e =>
        e.vorname.toLowerCase().includes(value) ||
        e.nachname.toLowerCase().includes(value) ||
        e.personalnr.includes(value) ||
        e.tel.includes(value)
    );

    renderEmployees(result);
}

</script>

</body>
</html>
