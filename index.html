<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal · BYOD Studios</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #060a0f;
  --surface: #0d1219;
  --card: #111820;
  --card-hover: #161f2a;
  --accent: #00e5ff;
  --accent2: #7b61ff;
  --accent-glow: rgba(0,229,255,0.18);
  --text: #dde6f0;
  --muted: #6b7f94;
  --border: rgba(255,255,255,0.06);
  --border-accent: rgba(0,229,255,0.3);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── Background grid ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  top: -30%;
  left: 50%;
  transform: translateX(-50%);
  width: 900px;
  height: 600px;
  background: radial-gradient(ellipse, rgba(0,229,255,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ─── Header ─── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  height: 64px;
  background: rgba(6,10,15,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.1rem;
  letter-spacing: 0.05em;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.user-badge {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  border-radius: 99px;
  background: var(--card);
  border: 1px solid var(--border-accent);
  font-size: 0.82rem;
  color: var(--accent);
  font-family: 'Syne', sans-serif;
  font-weight: 600;
}

.user-badge.visible { display: flex; }

.logout-btn {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 99px;
  background: transparent;
  border: 1px solid rgba(255,80,80,0.4);
  color: #ff6b6b;
  font-size: 0.8rem;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  width: auto;
}

.logout-btn:hover {
  background: rgba(255,80,80,0.12);
  border-color: #ff6b6b;
  transform: translateY(-1px);
  box-shadow: none;
}

.logout-btn.visible { display: flex; }

/* ─── Main layout ─── */
main {
  position: relative;
  z-index: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: calc(100vh - 64px);
  padding: 40px 20px;
}

/* ─── Login ─── */
.login-wrap {
  width: 100%;
  max-width: 400px;
  animation: fadeUp 0.5s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.login-header {
  text-align: center;
  margin-bottom: 36px;
}

.login-header h1 {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 2rem;
  color: var(--text);
}

.login-header p {
  margin-top: 6px;
  font-size: 0.88rem;
  color: var(--muted);
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.5);
}

.field {
  margin-bottom: 16px;
}

.field label {
  display: block;
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--muted);
  margin-bottom: 7px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.field input {
  width: 100%;
  padding: 12px 16px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.field input:focus {
  border-color: var(--border-accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.btn-primary {
  width: 100%;
  margin-top: 8px;
  padding: 13px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #00e5ff 0%, #00bcd4 100%);
  color: #001a1f;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: all 0.25s;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(0,229,255,0.35);
}

.error-msg {
  margin-top: 12px;
  padding: 10px 14px;
  border-radius: 8px;
  background: rgba(255,80,80,0.1);
  border: 1px solid rgba(255,80,80,0.25);
  color: #ff8080;
  font-size: 0.85rem;
  display: none;
}

/* ─── Loading ─── */
.loading-wrap {
  text-align: center;
  display: none;
  animation: fadeUp 0.3s ease both;
}

.loading-wrap h2 {
  font-family: 'Syne', sans-serif;
  font-size: 1.2rem;
  color: var(--muted);
  margin-bottom: 24px;
  font-weight: 400;
}

.loader-ring {
  width: 52px;
  height: 52px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.85s linear infinite;
  margin: 0 auto;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Dashboard ─── */
.dashboard {
  display: none;
  width: 100%;
  max-width: 900px;
  animation: fadeUp 0.5s ease both;
}

.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.news-panel {
  grid-column: 1 / -1;
}

@media (max-width: 680px) {
  .dashboard-grid { grid-template-columns: 1fr; }
  .news-panel { grid-column: 1; }
  header { padding: 0 20px; }
}

/* ─── News ─── */
.news-feed {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.news-item {
  display: flex;
  gap: 16px;
  padding: 16px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  transition: all 0.2s;
  animation: fadeUp 0.4s ease both;
}

.news-item:hover {
  border-color: var(--border-accent);
  background: var(--card-hover);
}

.news-tag {
  flex-shrink: 0;
  align-self: flex-start;
  padding: 3px 9px;
  border-radius: 5px;
  font-size: 0.68rem;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.tag-info    { background: rgba(0,229,255,0.12); color: var(--accent); }
.tag-update  { background: rgba(123,97,255,0.15); color: #a78bfa; }
.tag-event   { background: rgba(34,197,94,0.12); color: #4ade80; }
.tag-wichtig { background: rgba(251,191,36,0.12); color: #fbbf24; }

.news-body { flex: 1; }

.news-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.92rem;
  color: var(--text);
  margin-bottom: 4px;
}

.news-text {
  font-size: 0.83rem;
  color: var(--muted);
  line-height: 1.55;
}

.news-date {
  flex-shrink: 0;
  font-size: 0.75rem;
  color: var(--muted);
  align-self: flex-start;
  white-space: nowrap;
}

.section-title {
  font-family: 'Syne', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title::before {
  content: '';
  width: 3px;
  height: 12px;
  background: var(--accent);
  border-radius: 2px;
  display: inline-block;
}

/* Apps panel */
.apps-panel .card { height: 100%; }

.app-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 13px 16px;
  margin-bottom: 8px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}

.app-btn:last-child { margin-bottom: 0; }

.app-btn:hover {
  background: var(--card-hover);
  border-color: var(--border-accent);
  transform: translateX(4px);
  box-shadow: none;
}

.app-arrow {
  color: var(--accent);
  font-size: 1rem;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
}

.app-btn:hover .app-arrow {
  opacity: 1;
  transform: translateX(2px);
}

.no-apps {
  color: var(--muted);
  font-size: 0.85rem;
  text-align: center;
  padding: 24px 0;
}

/* Directory panel */
.directory-panel .card { height: 100%; }

.search-row {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

.search-row input {
  flex: 1;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}

.search-row input:focus {
  border-color: var(--border-accent);
}

.search-btn {
  padding: 10px 16px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: #001a1f;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
  width: auto;
  transition: all 0.2s;
  flex-shrink: 0;
}

.search-btn:hover {
  box-shadow: 0 4px 16px rgba(0,229,255,0.35);
  transform: translateY(-1px);
}

.employee-list {
  max-height: 260px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.emp-card {
  padding: 13px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  margin-bottom: 8px;
  transition: all 0.2s;
  animation: fadeUp 0.3s ease both;
}

.emp-card:last-child { margin-bottom: 0; }

.emp-card:hover {
  border-color: var(--border-accent);
  background: var(--card-hover);
}

.emp-name {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.92rem;
  color: var(--text);
  margin-bottom: 5px;
}

.emp-nr {
  font-size: 0.75rem;
  color: var(--accent);
  background: var(--accent-glow);
  padding: 2px 7px;
  border-radius: 4px;
  margin-left: 6px;
  font-family: 'DM Sans', monospace;
}

.emp-details {
  font-size: 0.8rem;
  color: var(--muted);
  line-height: 1.6;
}

.emp-details a {
  color: var(--muted);
  text-decoration: none;
  transition: color 0.15s;
}

.emp-details a:hover { color: var(--accent); }

.search-hint {
  text-align: center;
  padding: 20px 0;
  color: var(--muted);
  font-size: 0.82rem;
}

.hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-dot"></span>
    BYOD STUDIOS
  </div>
  <div class="header-right">
    <div class="user-badge" id="userBadge">—</div>
    <button class="logout-btn" id="logoutBtn" onclick="logout()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Abmelden
    </button>
  </div>
</header>

<main>

  <!-- Login -->
  <div class="login-wrap" id="loginView">
    <div class="login-header">
      <h1>Willkommen zurück</h1>
      <p>Melde dich mit deiner Personalnummer an</p>
    </div>
    <div class="card">
      <div class="field">
        <label>Personalnummer</label>
        <input id="username" placeholder="z. B. 61128323" autocomplete="username" onkeydown="if(event.key==='Enter')login()">
      </div>
      <div class="field">
        <label>Passwort</label>
        <input id="password" type="password" placeholder="••••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
      </div>
      <button class="btn-primary" onclick="login()">Anmelden →</button>
      <div class="error-msg" id="errorMsg">Benutzername oder Passwort ist falsch.</div>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-wrap" id="loadingView">
    <h2>Einen Moment bitte …</h2>
    <div class="loader-ring"></div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboardView">
    <div class="dashboard-grid">

      <div class="apps-panel">
        <div class="section-title">Meine Apps</div>
        <div class="card">
          <div id="appsList"></div>
        </div>
      </div>

      <div class="directory-panel">
        <div class="section-title">Mitarbeiterverzeichnis</div>
        <div class="card">
          <div class="search-row">
            <input type="text" id="searchInput" placeholder="Name, Nr., Telefon …"
              oninput="searchEmployees()" onkeydown="if(event.key==='Enter')searchEmployees()">
            <button class="search-btn" onclick="searchEmployees()">Suchen</button>
          </div>
          <div class="employee-list" id="employeeList">
            <div class="search-hint">Suche starten, um Mitarbeiter zu finden</div>
          </div>
        </div>
      </div>

      <div class="news-panel">
        <div class="section-title">Neuigkeiten</div>
        <div class="news-feed" id="newsFeed"></div>
      </div>

    </div>
  </div>

</main>

<script>
const users = [
  {
    username: "61128323", password: "Indoorcycling2026!",
    vorname: "Louis", nachname: "Schwickert",
    apps: [
      { name: "UserHelpDesk", url: "https://byodstudios.onepage.me/userhelpdesk" },
      { name: "Intranet", url: "https://byodit1.bitrix24.de" },
      { name: "Prüfungsportal – Kandidatenzugang", url: "https://candidate.speedexam.net" },
      { name: "Homepage", url: "https://byodstudios.onepage.me" }
    ]
  },
  {
    username: "07040934", password: "start123!",
    vorname: "Tiemo", nachname: "Kroth",
    apps: []
  }
];

const employees = [
  { personalnr: "61128323", vorname: "Louis", nachname: "Schwickert", tel: "+49 15901993688", email: "LSchwickert.BYOD@outlook.de" },
  { personalnr: "07040934", vorname: "Tiemo", nachname: "Kroth", tel: "—", email: "TKroth.BYOD@outlook.de" }
];

const news = [
  {
    tag: "wichtig", label: "Wichtig",
    titel: "Neue IT-Sicherheitsrichtlinie ab April",
    text: "Ab dem 1. April gilt für alle Mitarbeiter eine aktualisierte Passwortrichtlinie. Passwörter müssen mindestens 12 Zeichen haben und alle 90 Tage erneuert werden.",
    datum: "21. März 2026"
  },
  {
    tag: "update", label: "Update",
    titel: "Bitrix24 Intranet – Wartung am Wochenende",
    text: "Das Intranet ist am Samstag, 22. März zwischen 02:00 und 06:00 Uhr wegen Wartungsarbeiten nicht erreichbar. Bitte plant eure Arbeit entsprechend.",
    datum: "20. März 2026"
  },
  {
    tag: "event", label: "Event",
    titel: "Team-Meeting Q2 – Termin steht fest",
    text: "Das nächste All-Hands-Meeting findet am 3. April um 10:00 Uhr statt. Der Link zur Videokonferenz wird rechtzeitig per E-Mail verschickt.",
    datum: "18. März 2026"
  },
  {
    tag: "info", label: "Info",
    titel: "Willkommen im neuen Portal",
    text: "Das BYOD Studios Intranet-Portal wurde vollständig überarbeitet. Bei Fragen oder Feedback wendet euch an den UserHelpDesk.",
    datum: "15. März 2026"
  }
];

let currentUser = null;

function login() {
  const uInput = document.getElementById("username").value.trim();
  const pInput = document.getElementById("password").value;
  const err    = document.getElementById("errorMsg");

  const user = users.find(u => u.username === uInput && u.password === pInput);

  if (user) {
    currentUser = user;
    err.style.display = "none";

    show("loadingView", "flex");
    hide("loginView");

    setTimeout(() => {
      hide("loadingView");
      showDashboard(user);
    }, 1800);
  } else {
    err.style.display = "block";
    document.getElementById("password").value = "";
  }
}

function showDashboard(user) {
  document.getElementById("userBadge").textContent = user.vorname + " " + user.nachname;
  document.getElementById("userBadge").classList.add("visible");
  document.getElementById("logoutBtn").classList.add("visible");

  loadApps(user.apps);
  loadNews();
  show("dashboardView", "block");
}

function logout() {
  currentUser = null;
  hide("dashboardView");
  document.getElementById("userBadge").classList.remove("visible");
  document.getElementById("logoutBtn").classList.remove("visible");
  document.getElementById("username").value = "";
  document.getElementById("password").value = "";
  document.getElementById("searchInput").value = "";
  document.getElementById("employeeList").innerHTML = '<div class="search-hint">Suche starten, um Mitarbeiter zu finden</div>';
  show("loginView", "flex");
}

function loadApps(apps) {
  const list = document.getElementById("appsList");
  list.innerHTML = "";

  if (!apps.length) {
    list.innerHTML = '<div class="no-apps">Keine Apps zugewiesen</div>';
    return;
  }

  apps.forEach((app, i) => {
    const btn = document.createElement("button");
    btn.className = "app-btn";
    btn.style.animationDelay = (i * 0.07) + "s";
    btn.innerHTML = `<span>${app.name}</span><span class="app-arrow">→</span>`;
    btn.onclick = () => window.open(app.url, "_blank");
    list.appendChild(btn);
  });
}

function loadNews() {
  const feed = document.getElementById("newsFeed");
  feed.innerHTML = news.map((n, i) => `
    <div class="news-item" style="animation-delay:${i * 0.08}s">
      <span class="news-tag tag-${n.tag}">${n.label}</span>
      <div class="news-body">
        <div class="news-title">${n.titel}</div>
        <div class="news-text">${n.text}</div>
      </div>
      <span class="news-date">${n.datum}</span>
    </div>
  `).join("");
}

function searchEmployees() {
  const val = document.getElementById("searchInput").value.trim().toLowerCase();
  const container = document.getElementById("employeeList");

  if (!val) {
    container.innerHTML = '<div class="search-hint">Suche starten, um Mitarbeiter zu finden</div>';
    return;
  }

  const results = employees.filter(e =>
    e.vorname.toLowerCase().includes(val) ||
    e.nachname.toLowerCase().includes(val) ||
    e.personalnr.includes(val) ||
    e.tel.includes(val) ||
    e.email.toLowerCase().includes(val)
  );

  if (!results.length) {
    container.innerHTML = '<div class="search-hint">Keine Treffer gefunden</div>';
    return;
  }

  container.innerHTML = results.map(e => `
    <div class="emp-card">
      <div class="emp-name">
        ${e.vorname} ${e.nachname}
        <span class="emp-nr">${e.personalnr}</span>
      </div>
      <div class="emp-details">
        📞 ${e.tel}<br>
        ✉️ <a href="mailto:${e.email}">${e.email}</a>
      </div>
    </div>
  `).join("");
}

function show(id, d = "block") { document.getElementById(id).style.display = d; }
function hide(id) { document.getElementById(id).style.display = "none"; }
</script>
</body>
</html>
