<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal · BYOD Studios</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #060a0f;
  --surface: #0d1219;
  --card: #111820;
  --card-hover: #161f2a;
  --accent: #00e5ff;
  --accent2: #7b61ff;
  --accent-glow: rgba(0,229,255,0.18);
  --text: #dde6f0;
  --muted: #6b7f94;
  --border: rgba(255,255,255,0.06);
  --border-accent: rgba(0,229,255,0.3);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none; z-index: 0;
}

body::after {
  content: '';
  position: fixed; top: -30%; left: 50%; transform: translateX(-50%);
  width: 900px; height: 600px;
  background: radial-gradient(ellipse, rgba(0,229,255,0.06) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

/* ─── Header ─── */
header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px; height: 64px;
  background: rgba(6,10,15,0.88);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem;
  letter-spacing: 0.05em; color: var(--text);
  display: flex; align-items: center; gap: 10px;
}
.logo-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 10px var(--accent);
}

.header-right { display: flex; align-items: center; gap: 12px; }

.admin-badge {
  display: none; padding: 4px 10px; border-radius: 99px;
  background: rgba(123,97,255,0.18); border: 1px solid rgba(123,97,255,0.4);
  color: #a78bfa; font-size: 0.72rem; font-family: 'Syne', sans-serif;
  font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
}
.admin-badge.visible { display: flex; }

.user-badge {
  display: none; align-items: center; gap: 8px; padding: 6px 14px;
  border-radius: 99px; background: var(--card); border: 1px solid var(--border-accent);
  font-size: 0.82rem; color: var(--accent); font-family: 'Syne', sans-serif; font-weight: 600;
}
.user-badge.visible { display: flex; }

.logout-btn {
  display: none; align-items: center; gap: 6px; padding: 6px 14px;
  border-radius: 99px; background: transparent; border: 1px solid rgba(255,80,80,0.4);
  color: #ff6b6b; font-size: 0.8rem; font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: all 0.2s; width: auto;
}
.logout-btn:hover { background: rgba(255,80,80,0.12); border-color: #ff6b6b; transform: translateY(-1px); box-shadow: none; }
.logout-btn.visible { display: flex; }

/* ─── Main ─── */
main {
  position: relative; z-index: 1;
  display: flex; justify-content: center; align-items: flex-start;
  min-height: calc(100vh - 64px); padding: 40px 20px;
}

/* ─── Login ─── */
.login-wrap { width: 100%; max-width: 400px; animation: fadeUp 0.5s ease both; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.login-header { text-align: center; margin-bottom: 36px; }
.login-header h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2rem; }
.login-header p  { margin-top: 6px; font-size: 0.88rem; color: var(--muted); }

.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 32px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.5);
}

.field { margin-bottom: 16px; }
.field label {
  display: block; font-size: 0.78rem; font-weight: 500; color: var(--muted);
  margin-bottom: 7px; letter-spacing: 0.06em; text-transform: uppercase;
}
.field input {
  width: 100%; padding: 12px 16px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.field input:focus { border-color: var(--border-accent); box-shadow: 0 0 0 3px var(--accent-glow); }

.btn-primary {
  width: 100%; margin-top: 8px; padding: 13px; border-radius: 10px; border: none;
  background: linear-gradient(135deg, #00e5ff 0%, #00bcd4 100%); color: #001a1f;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem;
  cursor: pointer; letter-spacing: 0.04em; transition: all 0.25s;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,229,255,0.35); }

.error-msg {
  margin-top: 12px; padding: 10px 14px; border-radius: 8px;
  background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.25);
  color: #ff8080; font-size: 0.85rem; display: none;
}

/* ─── Loading ─── */
.loading-wrap { text-align: center; display: none; animation: fadeUp 0.3s ease both; }
.loading-wrap h2 { font-family: 'Syne', sans-serif; font-size: 1.2rem; color: var(--muted); margin-bottom: 24px; font-weight: 400; }
.loader-ring {
  width: 52px; height: 52px; border: 3px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.85s linear infinite; margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Dashboard ─── */
.dashboard { display: none; width: 100%; max-width: 960px; animation: fadeUp 0.5s ease both; }

/* ─── Tabs ─── */
.tab-bar {
  display: flex; gap: 4px; margin-bottom: 28px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 5px;
}
.tab-btn {
  flex: 1; padding: 10px 16px; border-radius: 10px; border: none;
  background: transparent; color: var(--muted);
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem;
  letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer; transition: all 0.2s; width: auto;
}
.tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); box-shadow: none; transform: none; }
.tab-btn.active { background: var(--surface); color: var(--accent); border: 1px solid var(--border-accent); box-shadow: 0 2px 12px rgba(0,0,0,0.3); }

.tab-panel { display: none; }
.tab-panel.active { display: block; animation: fadeUp 0.3s ease both; }

/* ─── Layout helpers ─── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 700px) {
  .two-col { grid-template-columns: 1fr; }
  header { padding: 0 18px; }
  .tab-btn { font-size: 0.7rem; padding: 9px 6px; }
}

.section-title {
  font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.section-title::before {
  content: ''; width: 3px; height: 12px;
  background: var(--accent); border-radius: 2px; display: inline-block;
}

/* ─── Apps ─── */
.app-btn {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 13px 16px; margin-bottom: 8px;
  border-radius: 10px; border: 1px solid var(--border); background: var(--surface);
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500;
  cursor: pointer; transition: all 0.2s; text-align: left;
}
.app-btn:last-child { margin-bottom: 0; }
.app-btn:hover { background: var(--card-hover); border-color: var(--border-accent); transform: translateX(4px); box-shadow: none; }
.app-arrow { color: var(--accent); font-size: 1rem; opacity: 0; transition: opacity 0.2s, transform 0.2s; }
.app-btn:hover .app-arrow { opacity: 1; transform: translateX(2px); }
.no-apps { color: var(--muted); font-size: 0.85rem; text-align: center; padding: 24px 0; }

/* ─── Directory ─── */
.search-row { display: flex; gap: 8px; margin-bottom: 14px; }
.search-row input {
  flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem; outline: none; transition: border-color 0.2s;
}
.search-row input:focus { border-color: var(--border-accent); }
.search-btn {
  padding: 10px 16px; border-radius: 10px; border: none; background: var(--accent);
  color: #001a1f; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem;
  cursor: pointer; width: auto; transition: all 0.2s; flex-shrink: 0;
}
.search-btn:hover { box-shadow: 0 4px 16px rgba(0,229,255,0.35); transform: translateY(-1px); }
.employee-list { max-height: 300px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.emp-card {
  padding: 13px 14px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--surface); margin-bottom: 8px; transition: all 0.2s; animation: fadeUp 0.3s ease both;
}
.emp-card:last-child { margin-bottom: 0; }
.emp-card:hover { border-color: var(--border-accent); background: var(--card-hover); }
.emp-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.92rem; margin-bottom: 5px; }
.emp-nr { font-size: 0.75rem; color: var(--accent); background: var(--accent-glow); padding: 2px 7px; border-radius: 4px; margin-left: 6px; }
.emp-details { font-size: 0.8rem; color: var(--muted); line-height: 1.6; }
.emp-details a { color: var(--muted); text-decoration: none; transition: color 0.15s; }
.emp-details a:hover { color: var(--accent); }
.search-hint { text-align: center; padding: 20px 0; color: var(--muted); font-size: 0.82rem; }

/* ─── News ─── */
.news-feed { display: flex; flex-direction: column; gap: 12px; }
.news-item {
  display: flex; gap: 16px; padding: 16px; border-radius: 12px;
  border: 1px solid var(--border); background: var(--surface);
  transition: all 0.2s; animation: fadeUp 0.4s ease both;
}
.news-item:hover { border-color: var(--border-accent); background: var(--card-hover); }
.news-tag {
  flex-shrink: 0; align-self: flex-start; padding: 3px 9px; border-radius: 5px;
  font-size: 0.68rem; font-family: 'Syne', sans-serif; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
}
.tag-info    { background: rgba(0,229,255,0.12);  color: var(--accent); }
.tag-update  { background: rgba(123,97,255,0.15); color: #a78bfa; }
.tag-event   { background: rgba(34,197,94,0.12);  color: #4ade80; }
.tag-wichtig { background: rgba(251,191,36,0.12); color: #fbbf24; }
.news-body { flex: 1; }
.news-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.92rem; margin-bottom: 4px; }
.news-text  { font-size: 0.83rem; color: var(--muted); line-height: 1.55; }
.news-date  { flex-shrink: 0; font-size: 0.75rem; color: var(--muted); align-self: flex-start; white-space: nowrap; }

/* ─── Tasks ─── */
.tasks-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }

.btn-add-task {
  display: flex; align-items: center; gap: 6px; padding: 8px 16px;
  border-radius: 10px; border: none;
  background: linear-gradient(135deg, #00e5ff, #00bcd4); color: #001a1f;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem;
  letter-spacing: 0.04em; cursor: pointer; transition: all 0.2s; width: auto;
}
.btn-add-task:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,229,255,0.3); }

.task-filter-row { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
.filter-chip {
  padding: 5px 14px; border-radius: 99px; border: 1px solid var(--border);
  background: var(--surface); color: var(--muted);
  font-size: 0.78rem; font-family: 'Syne', sans-serif; font-weight: 600;
  cursor: pointer; transition: all 0.2s; width: auto;
}
.filter-chip:hover { border-color: var(--border-accent); color: var(--text); box-shadow: none; transform: none; }
.filter-chip.active { border-color: var(--border-accent); background: var(--accent-glow); color: var(--accent); }

.task-list { display: flex; flex-direction: column; gap: 10px; }

.task-item {
  display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px;
  border-radius: 12px; border: 1px solid var(--border); background: var(--surface);
  transition: all 0.2s; animation: fadeUp 0.3s ease both;
}
.task-item:hover { border-color: var(--border-accent); background: var(--card-hover); }
.task-item.done { opacity: 0.5; }
.task-item.done .task-title { text-decoration: line-through; color: var(--muted); }

.task-check {
  width: 20px; height: 20px; flex-shrink: 0; margin-top: 2px;
  border-radius: 6px; border: 2px solid var(--border-accent);
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.task-check:hover { background: var(--accent-glow); }
.task-check.checked { background: var(--accent); border-color: var(--accent); }
.task-check.checked::after { content: '✓'; font-size: 0.72rem; color: #001a1f; font-weight: 900; }

.task-body { flex: 1; min-width: 0; }
.task-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; margin-bottom: 3px; }
.task-desc  { font-size: 0.8rem; color: var(--muted); margin-top: 3px; line-height: 1.4; }
.task-meta  { font-size: 0.78rem; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; align-items: center; }

.prio-badge {
  padding: 2px 8px; border-radius: 4px;
  font-size: 0.68rem; font-family: 'Syne', sans-serif; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
}
.prio-hoch    { background: rgba(239,68,68,0.15);  color: #f87171; }
.prio-mittel  { background: rgba(251,191,36,0.15); color: #fbbf24; }
.prio-niedrig { background: rgba(34,197,94,0.12);  color: #4ade80; }

.assignee-badge {
  display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px;
  border-radius: 99px; background: rgba(123,97,255,0.12); color: #a78bfa;
  font-size: 0.72rem; font-family: 'Syne', sans-serif; font-weight: 600;
}

.task-actions { display: flex; gap: 6px; flex-shrink: 0; }
.task-action-btn {
  width: 30px; height: 30px; border-radius: 7px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); cursor: pointer; font-size: 0.85rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; padding: 0;
}
.task-action-btn:hover { border-color: var(--border-accent); color: var(--text); background: var(--card-hover); box-shadow: none; transform: none; }
.task-action-btn.delete:hover { border-color: rgba(239,68,68,0.4); color: #f87171; background: rgba(239,68,68,0.08); }

.no-tasks { text-align: center; padding: 36px 0; color: var(--muted); font-size: 0.85rem; }

.emp-task-group { margin-bottom: 28px; }
.emp-task-group:last-child { margin-bottom: 0; }

/* ─── Modal ─── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.72); backdrop-filter: blur(6px);
  align-items: center; justify-content: center;
  animation: fadeIn 0.2s ease both; display: none;
}
.modal-overlay.open { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  width: 100%; max-width: 460px; margin: 20px;
  background: var(--card); border: 1px solid var(--border-accent);
  border-radius: 20px; padding: 32px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.7);
  animation: fadeUp 0.25s ease both;
}
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.modal-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.15rem; }
.modal-close {
  width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); cursor: pointer; font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s; padding: 0;
}
.modal-close:hover { border-color: var(--border-accent); color: var(--text); box-shadow: none; transform: none; }

.modal-field { margin-bottom: 16px; }
.modal-field label {
  display: block; font-size: 0.76rem; font-weight: 500; color: var(--muted);
  margin-bottom: 7px; letter-spacing: 0.06em; text-transform: uppercase;
}
.modal-field input, .modal-field select, .modal-field textarea {
  width: 100%; padding: 11px 14px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 0.93rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus {
  border-color: var(--border-accent); box-shadow: 0 0 0 3px var(--accent-glow);
}
.modal-field select option { background: #0d1219; }
.modal-field textarea { resize: vertical; min-height: 80px; }

.modal-footer { display: flex; gap: 10px; margin-top: 20px; }
.btn-cancel {
  flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-weight: 500; cursor: pointer; transition: all 0.2s;
}
.btn-cancel:hover { border-color: var(--border-accent); color: var(--text); box-shadow: none; transform: none; }
.btn-save {
  flex: 2; padding: 12px; border-radius: 10px; border: none;
  background: linear-gradient(135deg, #00e5ff, #00bcd4); color: #001a1f;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.92rem;
  cursor: pointer; transition: all 0.2s;
}
.btn-save:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,229,255,0.3); }

.hidden { display: none !important; }
</style>

</head>

<div class="modal-overlay" id="taskModal">

  </div>
</div>

<script>
/* ─── DATA ─── */
const users = [
  {
    username: "61128323", password: "Indoorcycling2026!",
    vorname: "Louis", nachname: "Schwickert", admin: true,
    apps: [
      { name: "UserHelpDesk",                     url: "https://byodstudios.onepage.me/userhelpdesk" },
      { name: "Intranet",                          url: "https://byodit1.bitrix24.de" },
      { name: "Prüfungsportal – Kandidatenzugang", url: "https://candidate.speedexam.net" },
      { name: "Homepage",                          url: "https://byodstudios.onepage.me" }
    ]
  },
  {
    username: "07040934", password: "start123!",
    vorname: "Tiemo", nachname: "Kroth", admin: false,
    apps: []
  }
];

const employees = [
  { personalnr: "61128323", vorname: "Louis", nachname: "Schwickert", tel: "+49 15901993688", email: "LSchwickert.BYOD@outlook.de" },
  { personalnr: "07040934", vorname: "Tiemo", nachname: "Kroth",      tel: "—",               email: "TKroth.BYOD@outlook.de" }
];

const news = [
  { tag:"wichtig", label:"Wichtig", titel:"Neue IT-Sicherheitsrichtlinie ab April",
    text:"Ab dem 1. April gilt eine aktualisierte Passwortrichtlinie. Passwörter müssen mindestens 12 Zeichen haben und alle 90 Tage erneuert werden.", datum:"21. März 2026" },
  { tag:"update",  label:"Update",  titel:"Bitrix24 Intranet – Wartung am Wochenende",
    text:"Das Intranet ist am Samstag, 22. März zwischen 02:00 und 06:00 Uhr nicht erreichbar. Bitte plant eure Arbeit entsprechend.", datum:"20. März 2026" },
  { tag:"event",   label:"Event",   titel:"Team-Meeting Q2 – Termin steht fest",
    text:"Das nächste All-Hands-Meeting findet am 3. April um 10:00 Uhr statt. Der Videolink wird rechtzeitig per E-Mail verschickt.", datum:"18. März 2026" },
  { tag:"info",    label:"Info",    titel:"Willkommen im neuen Portal",
    text:"Das BYOD Studios Intranet-Portal wurde vollständig überarbeitet. Bei Fragen oder Feedback wendet euch an den UserHelpDesk.", datum:"15. März 2026" }
];

let tasks = [
  { id:1, titel:"Onboarding-Unterlagen vorbereiten", beschreibung:"Alle Dokumente für den neuen Mitarbeiter zusammenstellen.", assignee:"61128323", prioritaet:"hoch",    faellig:"2026-03-28", erledigt:false },
  { id:2, titel:"Zugangsdaten für Bitrix24 prüfen",  beschreibung:"", assignee:"07040934", prioritaet:"mittel",  faellig:"2026-03-30", erledigt:false },
  { id:3, titel:"Passwort-Richtlinie kommunizieren", beschreibung:"", assignee:"07040934", prioritaet:"niedrig", faellig:"",           erledigt:true  }
];
let nextId = 4;
let currentUser = null;
let activeFilter = "alle";

/* ─── AUTH ─── */
function login() {
  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value;
  const err = document.getElementById("errorMsg");
  const user = users.find(x => x.username === u && x.password === p);
  if (user) {
    currentUser = user;
    err.style.display = "none";
    show("loadingView","flex"); hide("loginView");
    setTimeout(() => { hide("loadingView"); showDashboard(user); }, 1800);
  } else {
    err.style.display = "block";
    document.getElementById("password").value = "";
  }
}

function logout() {
  currentUser = null;
  hide("dashboardView");
  ["userBadge","logoutBtn","adminBadge"].forEach(id => document.getElementById(id).classList.remove("visible"));
  ["username","password","searchInput"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("employeeList").innerHTML = '<div class="search-hint">Suche starten, um Mitarbeiter zu finden</div>';
  switchTab("overview");
  show("loginView","flex");
}

/* ─── DASHBOARD ─── */
function showDashboard(user) {
  document.getElementById("userBadge").textContent = user.vorname + " " + user.nachname;
  document.getElementById("userBadge").classList.add("visible");
  document.getElementById("logoutBtn").classList.add("visible");

  if (user.admin) {
    document.getElementById("adminBadge").classList.add("visible");
    document.getElementById("addTaskBtn").style.display = "flex";
    document.getElementById("assigneeField").style.display = "block";
    populateAssigneeSelect();
  } else {
    document.getElementById("addTaskBtn").style.display = "none";
    document.getElementById("assigneeField").style.display = "none";
  }

  loadApps(user.apps);
  loadNews();
  renderTasks();
  renderOverviewTasks();
  show("dashboardView","block");
}

/* ─── TABS ─── */
function switchTab(name) {
  const names = ["overview","tasks","news","directory"];
  document.querySelectorAll(".tab-btn").forEach((b,i) => b.classList.toggle("active", names[i]===name));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
}

/* ─── APPS ─── */
function loadApps(apps) {
  const el = document.getElementById("appsList");
  if (!apps.length) { el.innerHTML='<div class="no-apps">Keine Apps zugewiesen</div>'; return; }
  el.innerHTML = "";
  apps.forEach((app,i) => {
    const btn = document.createElement("button");
    btn.className = "app-btn";
    btn.style.animationDelay = (i*0.07)+"s";
    btn.innerHTML = `<span>${app.name}</span><span class="app-arrow">→</span>`;
    btn.onclick = () => window.open(app.url,"_blank");
    el.appendChild(btn);
  });
}

/* ─── NEWS ─── */
function loadNews() {
  document.getElementById("newsFeed").innerHTML = news.map((n,i) => `
    <div class="news-item" style="animation-delay:${i*0.08}s">
      <span class="news-tag tag-${n.tag}">${n.label}</span>
      <div class="news-body">
        <div class="news-title">${n.titel}</div>
        <div class="news-text">${n.text}</div>
      </div>
      <span class="news-date">${n.datum}</span>
    </div>`).join("");
}

/* ─── DIRECTORY ─── */
function searchEmployees() {
  const val = document.getElementById("searchInput").value.trim().toLowerCase();
  const el  = document.getElementById("employeeList");
  if (!val) { el.innerHTML='<div class="search-hint">Suche starten, um Mitarbeiter zu finden</div>'; return; }
  const res = employees.filter(e =>
    e.vorname.toLowerCase().includes(val) || e.nachname.toLowerCase().includes(val) ||
    e.personalnr.includes(val) || e.tel.includes(val) || e.email.toLowerCase().includes(val)
  );
  if (!res.length) { el.innerHTML='<div class="search-hint">Keine Treffer gefunden</div>'; return; }
  el.innerHTML = res.map(e => `
    <div class="emp-card">
      <div class="emp-name">${e.vorname} ${e.nachname} <span class="emp-nr">${e.personalnr}</span></div>
      <div class="emp-details">📞 ${e.tel}<br>✉️ <a href="mailto:${e.email}">${e.email}</a></div>
    </div>`).join("");
}

/* ─── TASKS ─── */
function getFiltered() {
  let list = currentUser.admin ? [...tasks] : tasks.filter(t => t.assignee === currentUser.username);
  if (activeFilter==="offen")    list = list.filter(t => !t.erledigt);
  if (activeFilter==="erledigt") list = list.filter(t => t.erledigt);
  if (["hoch","mittel","niedrig"].includes(activeFilter)) list = list.filter(t => t.prioritaet===activeFilter);
  return list;
}

function renderTasks() {
  if (!currentUser) return;
  if (currentUser.admin) {
    document.getElementById("adminTaskView").style.display = "block";
    document.getElementById("userTaskList").style.display  = "none";
    renderAdminTasks();
  } else {
    document.getElementById("adminTaskView").style.display = "none";
    document.getElementById("userTaskList").style.display  = "flex";
    renderUserTasks();
  }
}

function renderAdminTasks() {
  const el = document.getElementById("adminTaskView");
  const list = getFiltered();
  if (!list.length) { el.innerHTML='<div class="no-tasks">Keine Aufgaben in dieser Ansicht</div>'; return; }

  // Group by assignee
  const groups = {};
  list.forEach(t => { if (!groups[t.assignee]) groups[t.assignee]=[]; groups[t.assignee].push(t); });

  el.innerHTML = Object.entries(groups).map(([nr, tList]) => {
    const emp = employees.find(e => e.personalnr===nr) || {vorname:nr, nachname:""};
    return `<div class="emp-task-group">
      <div class="section-title">${emp.vorname} ${emp.nachname}</div>
      <div class="task-list">${tList.map(taskHTML).join("")}</div>
    </div>`;
  }).join("");
}

function renderUserTasks() {
  const el = document.getElementById("userTaskList");
  const list = getFiltered();
  if (!list.length) { el.innerHTML='<div class="no-tasks">Keine Aufgaben in dieser Ansicht</div>'; return; }
  el.innerHTML = list.map(taskHTML).join("");
}

function renderOverviewTasks() {
  const el = document.getElementById("overviewTaskList");
  const myOpen = tasks.filter(t => t.assignee===currentUser.username && !t.erledigt).slice(0,4);
  if (!myOpen.length) { el.innerHTML='<div class="no-tasks">Keine offenen Aufgaben 🎉</div>'; return; }
  el.innerHTML = '<div class="task-list">'+myOpen.map(taskHTML).join("")+'</div>';
}

function taskHTML(t) {
  const emp  = employees.find(e => e.personalnr===t.assignee);
  const name = emp ? emp.vorname+" "+emp.nachname : t.assignee;
  const due  = t.faellig ? `<span>📅 ${fmt(t.faellig)}</span>` : "";
  const adminBtns = currentUser && currentUser.admin
    ? `<button class="task-action-btn" title="Bearbeiten" onclick="editTask(${t.id})">✏️</button>
       <button class="task-action-btn delete" title="Löschen" onclick="deleteTask(${t.id})">🗑</button>`
    : "";
  return `
    <div class="task-item ${t.erledigt?"done":""}" id="task-${t.id}">
      <div class="task-check ${t.erledigt?"checked":""}" onclick="toggleTask(${t.id})"></div>
      <div class="task-body">
        <div class="task-title">${t.titel}</div>
        ${t.beschreibung ? `<div class="task-desc">${t.beschreibung}</div>` : ""}
        <div class="task-meta">
          <span class="prio-badge prio-${t.prioritaet}">${t.prioritaet}</span>
          ${currentUser.admin ? `<span class="assignee-badge">👤 ${name}</span>` : ""}
          ${due}
        </div>
      </div>
      <div class="task-actions">${adminBtns}</div>
    </div>`;
}

function toggleTask(id) {
  const t = tasks.find(t => t.id===id);
  if (t) { t.erledigt=!t.erledigt; renderTasks(); renderOverviewTasks(); }
}

function deleteTask(id) {
  if (!confirm("Aufgabe wirklich löschen?")) return;
  tasks = tasks.filter(t => t.id!==id);
  renderTasks(); renderOverviewTasks();
}

function filterTasks(f, btn) {
  activeFilter = f;
  document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
  btn.classList.add("active");
  renderTasks();
}

/* ─── MODAL ─── */
function populateAssigneeSelect() {
  document.getElementById("taskAssignee").innerHTML =
    employees.map(e => `<option value="${e.personalnr}">${e.vorname} ${e.nachname}</option>`).join("");
}

function openModal(task=null) {
  document.getElementById("modalTitle").textContent = task ? "Aufgabe bearbeiten" : "Neue Aufgabe";
  document.getElementById("editTaskId").value   = task ? task.id : "";
  document.getElementById("taskTitle").value    = task ? task.titel : "";
  document.getElementById("taskDesc").value     = task ? task.beschreibung : "";
  document.getElementById("taskPriority").value = task ? task.prioritaet : "mittel";
  document.getElementById("taskDue").value      = task ? task.faellig : "";
  if (currentUser.admin) document.getElementById("taskAssignee").value = task ? task.assignee : employees[0].personalnr;
  document.getElementById("taskTitle").style.borderColor = "";
  document.getElementById("taskModal").classList.add("open");
  setTimeout(() => document.getElementById("taskTitle").focus(), 80);
}

function closeModal() { document.getElementById("taskModal").classList.remove("open"); }

function editTask(id) { openModal(tasks.find(t=>t.id===id)); }

function saveTask() {
  const titel = document.getElementById("taskTitle").value.trim();
  if (!titel) {
    document.getElementById("taskTitle").style.borderColor = "rgba(239,68,68,0.7)";
    document.getElementById("taskTitle").focus();
    return;
  }
  const editId   = document.getElementById("editTaskId").value;
  const assignee = currentUser.admin ? document.getElementById("taskAssignee").value : currentUser.username;
  const data = {
    titel,
    beschreibung: document.getElementById("taskDesc").value.trim(),
    assignee,
    prioritaet: document.getElementById("taskPriority").value,
    faellig:    document.getElementById("taskDue").value,
  };
  if (editId) {
    const t = tasks.find(t=>t.id===parseInt(editId));
    if (t) Object.assign(t, data);
  } else {
    tasks.unshift({ id: nextId++, erledigt: false, ...data });
  }
  closeModal();
  renderTasks();
  renderOverviewTasks();
}

document.getElementById("taskModal").addEventListener("click", e => { if (e.target===document.getElementById("taskModal")) closeModal(); });
document.addEventListener("keydown", e => { if (e.key==="Escape") closeModal(); });

/* ─── UTILS ─── */
function fmt(d) { if (!d) return ""; const [y,m,dd]=d.split("-"); return `${dd}.${m}.${y}`; }
function show(id,d="block") { document.getElementById(id).style.display=d; }
function hide(id)           { document.getElementById(id).style.display="none"; }
</script>
